<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fff0f5, #ffe4e1);
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: inherit;
    filter: blur(8px);
    opacity: 0.4;
    z-index: 0;
}
/* Hearts */
.heart {
      position: fixed;
    bottom: -20px;
    color: #ff4e78;
    opacity: 0.8;
    animation: floatSmooth 6s linear forwards; /* ✅ FIXED */
    pointer-events: none;
    z-index: 999;
}

@keyframes floatSmooth {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
}

/* Layout */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    height: 100%;
    position: relative;
    z-index: 2;
}

/* 🌹 Rose */
.rose {
    position: absolute;
    top: 30px;
    left: 50px;
    width: 120px;        
    opacity: 0.9;
}

/* Left letter */
.letter-box {
    position: relative;
}

.letter-img {
    width: 370px;
    border-radius: 20px;
    transform: rotate(3deg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* TEXT FIX */
.text {
    position: absolute;
    top: 14%;
    left: 12%;
    width: 76%;
    height: 62%;
    overflow: hidden;

    font-size: 12px;
    line-height: 1.5;
    white-space: pre-line;
}

/* Button */
.more-btn {
    margin-top: 15px;
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    background: #ff4e78;
    color: white;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.5s;
}

.more-btn.show {
    opacity: 1;
    transform: translateY(0);
}

/* Right note */
.note-box {
    position: relative;
    width: 238px;
    background: rgba(255,255,255,0.95);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);

    opacity: 0;
    transform: translateX(40px);
    transition: 3s ease;
}

.note-box.show {
    opacity: 1;
    transform: translateX(0);
}

/* Note image */
.note-img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* 🎯 Stickers (only for note) */
.sticker {
    position: absolute;
    width: 86px;
    animation: rotateSticker 0.5s ease-in-out infinite alternate;
}

@keyframes rotateSticker {
    from { transform: rotate(-10deg); }
    to { transform: rotate(10deg); }
}

/* positions around note */
.s1 { top: 1px; left: -35px; }
.s2 { top: -25px; right: -38px; }
.s3 { bottom: -28px; left: -41px; }
.s4 { bottom: -15px; right: -15px; }
.s5 { top: 50%; left: -25px; }
.s8 { top: 25%; left: 42px; }

/* Music button */
.music-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #ff4e78;
    color: white;
    cursor: pointer;
    z-index: 3;
}
#s8
{
    width: 163px;
}
</style>
</head>

<body>
<div id="tapLayer" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
"></div>
<audio id="music" loop>
    <source src="Into-You.mp3" type="audio/mp3">
</audio>

<!-- 🌹 ROSE -->
<img src="bg-rmoe-removebg-preview.png" class="rose">

<div class="container">

    <!-- LEFT LETTER -->
    <div class="letter-box">
        <img src="2.jpeg" class="letter-img">
        <div id="text" class="text"></div>

        <button id="btn" class="more-btn" onclick="showNote()">
            Read one more thing…
        </button>
    </div>

    <!-- RIGHT NOTE -->
    <div id="note" class="note-box">

        <!-- stickers -->
        <img src="s1.png" class="sticker s1">
        <img src="s2.png" class="sticker s2">
        <img src="s3.png" class="sticker s3">
        <img src="s4.png" class="sticker s4">
        <img src="s5.png" class="sticker s5">
        <img src="s8.png" class="sticker s8" id="s8" >

        <img src="2.jpeg" class="note-img">

        <p>
        Ek aur baat bolni thi…

        Main perfect nahi hu, aur shayad uss din maine tujhe woh feel karaya
        jo tujhe kabhi feel nahi hona chahiye tha.

        Par ek cheez sach hai 
        tu mere liye important hai.

        Main sirf bol nahi raha,
        main genuinely better banna chahta hu.

        Bas itna hi.
        </p>
    </div>

</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
window.addEventListener("load", () => {
    const music = document.getElementById("music");

    music.volume = 0.6;

    music.play().catch(() => {
        console.log("Autoplay blocked, waiting interaction");
    });
});
// FLOW CONTROL
if (sessionStorage.getItem("cameFromIndex") !== "true") {
    window.location.href = "index.html";
}

// MESSAGE
const message = `Sun...

Main kuch justify nahi karna chahta.

Bas itna honestly bolna hai ki
maine us din galti ki.

Aur jab bhi us moment ko yaad karta hoon,
toh samajh aata hai ki tujhe kaisa feel hua hoga...

Aur honestly, woh soch ke achha nahi lagta.

Main nahi chahta ki tu yeh soch le ki ,
mujhe fark nahi pada kyunki pada hai.

Main bas ye accept kar raha hoon ki...,
 maine tujhe hurt kiya.

Shayad pehle main is baat ko utni clarity,
se samajh nahi paaya tha.

Uske liye Sorry !!`;

// Typing
let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    } else {
        document.getElementById("btn").classList.add("show");
    }
}
setTimeout(typeWriter, 800);

// Show note
function showNote() {
    document.getElementById("note").classList.add("show");
}

// Hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    const size = 10 + Math.random() * 20;

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = size + "px";
    heart.style.opacity = 0.4 + Math.random() * 0.6;

    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}, 150);

// Music
const music = document.getElementById("music");
const tapLayer = document.getElementById("tapLayer");

let started = false;

// 🎵 guaranteed user-gesture audio start
function startExperience() {
    if (started) return;
    started = true;

    tapLayer.remove();

    music.volume = 0.6;

    music.play().catch((err) => {
        console.log("Autoplay blocked:", err);
    });
}

  

// must be real first click
tapLayer.addEventListener("click", startExperience, { once: true });

// toggle button (optional manual control)
function toggleMusic() {
    if (music.paused) {
        startExperience();
    } else {
        music.pause();
    }
}


</script>

</body>
</html>
